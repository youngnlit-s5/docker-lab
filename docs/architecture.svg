<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="420" fill="#f7f9fc"/>
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1F3864">docker-lab — service architecture</text>
  <rect x="40" y="170" width="120" height="60" rx="8" fill="#ffffff" stroke="#1F3864" stroke-width="2"/>
  <text x="100" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Client</text>
  <text x="100" y="214" text-anchor="middle" font-size="11" fill="#666">:80 / :443</text>
  <rect x="230" y="160" width="150" height="80" rx="8" fill="#e8f0fe" stroke="#1F3864" stroke-width="2"/>
  <text x="305" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#1F3864">nginx</text>
  <text x="305" y="207" text-anchor="middle" font-size="11" fill="#444">reverse proxy + TLS</text>
  <text x="305" y="223" text-anchor="middle" font-size="10" fill="#777">/healthz</text>
  <rect x="470" y="70" width="200" height="66" rx="8" fill="#ffffff" stroke="#2E7D32" stroke-width="2"/>
  <text x="570" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Uptime Kuma</text>
  <text x="570" y="116" text-anchor="middle" font-size="11" fill="#666">status.lab.local :3001</text>
  <rect x="470" y="176" width="200" height="66" rx="8" fill="#ffffff" stroke="#2496ED" stroke-width="2"/>
  <text x="570" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#2496ED">Registry v2</text>
  <text x="570" y="222" text-anchor="middle" font-size="11" fill="#666">registry.lab.local :5000</text>
  <rect x="470" y="282" width="200" height="66" rx="8" fill="#fff8e1" stroke="#E57000" stroke-width="2"/>
  <text x="570" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#E57000">backup</text>
  <text x="570" y="328" text-anchor="middle" font-size="11" fill="#666">nightly tar.gz + prune</text>
  <rect x="230" y="300" width="150" height="60" rx="8" fill="#f0f0f0" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="305" y="326" text-anchor="middle" font-size="12" font-weight="600" fill="#555">named volumes</text>
  <text x="305" y="344" text-anchor="middle" font-size="10" fill="#777">kuma-data · registry-data</text>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1F3864"/></marker>
    <marker id="o" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#E57000"/></marker>
  </defs>
  <line x1="160" y1="200" x2="228" y2="200" stroke="#1F3864" stroke-width="2" marker-end="url(#a)"/>
  <line x1="380" y1="185" x2="468" y2="110" stroke="#1F3864" stroke-width="2" marker-end="url(#a)"/>
  <line x1="380" y1="205" x2="468" y2="205" stroke="#1F3864" stroke-width="2" marker-end="url(#a)"/>
  <line x1="570" y1="136" x2="570" y2="174" stroke="#999" stroke-width="1.5" stroke-dasharray="3 3"/>
  <path d="M470,315 C420,320 400,330 382,330" fill="none" stroke="#E57000" stroke-width="2" marker-end="url(#o)"/>
  <line x1="305" y1="240" x2="305" y2="298" stroke="#999" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="40" y="392" font-size="11" fill="#999">All services share the internal "web" bridge network; only nginx is published to the host.</text>
</svg>
